# Skill configurations for ValueGuard

llm_call:
  default_provider: deepseek
  providers:
    deepseek:
      model: deepseek-chat
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0.0
      max_tokens: 2048
      base_url: https://api.deepseek.com/v1
    openai:
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
      temperature: 0.0
      max_tokens: 2048
    anthropic:
      model: claude-3-5-sonnet-20241022
      api_key_env: ANTHROPIC_API_KEY
      temperature: 0.0
      max_tokens: 2048
    qwen:
      model: qwen-plus
      api_key_env: QWEN_API_KEY
      temperature: 0.0
      max_tokens: 2048
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

vector_search:
  embedding_model: BAAI/bge-small-en-v1.5
  index_type: faiss
  chunk_size: 512
  overlap: 64
  cache_dir: .valueguard/index

ast_analysis:
  languages:
    - python
    - javascript
    - typescript
    - java
    - go
  max_call_depth: 5

code_chunking:
  context_lines: 3

doc_collector:
  max_length: 10000
  sources:
    - readme
    - config
