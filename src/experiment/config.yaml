datasets:
  code_scenarios:
    enabled: true
    type: json
    scenario_type: code
    path: code_scenarios.json
  text_scenarios:
    enabled: true
    type: json
    scenario_type: text
    path: text_scenarios/issues.json

evaluation:
  confidence_threshold: 0.5
  metrics:
    - precision
    - recall
    - f1_score
    - jaccard_index
    - cohen_kappa
    - exact_match
  use_confidence_weighting: true

iaa_experiment:
  annotators:
    human:
      annotator_id: Human
      label_source: ground_truth
    llm_annotators:
      - gemini-2.5-flash
      - deepseek-chat
      - qwen-plus
      - o4-mini
      - claude-sonnet-4-5
      - o3-mini
      - grok-4
  llm_outputs_dir: experiment_outputs/cache/llm_outputs
  metrics:
    dim1:
      - cohen_kappa
      - fleiss_kappa
      - krippendorff_alpha
      - percent_agreement
    dim2:
      - pairwise_jaccard
      - pairwise_symmetric_f1
      - per_value_fleiss_kappa
  output_dir: experiment_outputs/results/iaa

llm_models:
  claude-sonnet-4-5:
    api_key_env: GPTSAPI_KEY
    base_url: https://api.gptsapi.net/v1
    enabled: true
    max_tokens: 2048
    model_name: claude-sonnet-4-5
    provider: openai
    temperature: 0.0
  deepseek-chat:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    enabled: true
    max_tokens: 2048
    model_name: deepseek-chat
    provider: openai
    temperature: 0.0
  gemini-2.5-flash:
    api_key_env: GPTSAPI_KEY
    base_url: https://api.gptsapi.net/v1
    enabled: true
    max_tokens: 2048
    model_name: gemini-2.5-flash
    provider: openai
    temperature: 0.0
  gpt-5.2:
    api_key_env: GPTSAPI_KEY
    base_url: https://api.gptsapi.net/v1
    enabled: true
    max_tokens: 2048
    model_name: gpt-5.2
    provider: openai
    temperature: 1.0
  grok-4:
    api_key_env: GPTSAPI_KEY
    base_url: https://api.gptsapi.net/v1
    enabled: true
    max_tokens: 2048
    model_name: grok-4
    provider: openai
    temperature: 0.0
  o4-mini:
    api_key_env: GPTSAPI_KEY
    base_url: https://api.gptsapi.net/v1
    enabled: true
    max_tokens: 2048
    model_name: o4-mini
    provider: openai
    temperature: 1.0
  qwen-plus:
    api_key_env: DASHSCOPE_API_KEY
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    enabled: true
    max_tokens: 2048
    model_name: qwen-plus
    provider: openai
    temperature: 0.0

main_experiment:
  primary_model: qwen-plus
  validation_models:
    - deepseek-chat
    - grok-4
  ablation:
    enabled: true
    variants:
      - name: ValueGuard (Full)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
      - name: Pipeline w/o Profile
        profile_mode: uniform
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
      - name: Pipeline w/o Evidence
        profile_mode: real
        skip_evidence: true
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
      - name: Pipeline w/o Profile & Evidence
        profile_mode: uniform
        skip_evidence: true
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
      - name: Profile alpha=0
        profile_mode: real
        skip_evidence: false
        profile_alpha: 0.0
        search_depth: 3
        top_k: 10
      - name: Profile alpha=0.5
        profile_mode: real
        skip_evidence: false
        profile_alpha: 0.5
        search_depth: 3
        top_k: 10
      - name: Profile alpha=2
        profile_mode: real
        skip_evidence: false
        profile_alpha: 2.0
        search_depth: 3
        top_k: 10
      - name: Evidence depth=1
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 1
        top_k: 10
      - name: Evidence depth=5
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 5
        top_k: 10
      - name: Evidence top_k=3
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 3
      - name: ValueGuard (Threshold)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        profile_threshold_mode: threshold
      - name: Threshold w/o Evidence
        profile_mode: real
        skip_evidence: true
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        profile_threshold_mode: threshold
      - name: Threshold alpha=0
        profile_mode: real
        skip_evidence: false
        profile_alpha: 0.0
        search_depth: 3
        top_k: 10
        profile_threshold_mode: threshold
      - name: ValueGuard (Post-hoc)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        profile_prompt_injection: false
      - name: Post-hoc w/o Evidence
        profile_mode: real
        skip_evidence: true
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        profile_prompt_injection: false
      - name: Post-hoc + Threshold
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        profile_threshold_mode: threshold
        profile_prompt_injection: false
      - name: ValueGuard (Text theta=0.6)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        text_confidence_threshold: 0.6
      - name: ValueGuard (Text theta=0.7)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        text_confidence_threshold: 0.7
      - name: ValueGuard (Text theta=0.8)
        profile_mode: real
        skip_evidence: false
        profile_alpha: 1.0
        search_depth: 3
        top_k: 10
        text_confidence_threshold: 0.8
  llm_only:
    enabled: true
    iaa_cache_dir: experiment_outputs/cache/llm_outputs
  profile:
    cache_dir: experiment_outputs/cache/profile_cache
  output_dir: experiment_outputs/results/main_exp
  max_samples: 0
  parallel_workers: 4
  statistical_tests:
    bootstrap_iterations: 10000
    significance_level: 0.05

output:
  output_dir: experiment_outputs
  logs_dir: experiment_outputs/logs
  results_dir: experiment_outputs/results/main_exp
  save_raw_responses: true
  generate_latex: true
  generate_markdown: true

profile_experiment:
  cache_dir: experiment_outputs/cache/profile_cache
  exp1_characterization:
    representative_model: deepseek-chat
  exp2_cross_model:
    models:
      - deepseek-chat
      - qwen-plus
      - o4-mini
      - claude-sonnet-4-5
      - gpt-5.2
      - grok-4
      - gemini-2.5-flash
  exp3_downstream:
    alpha_values:
      - 0
      - 0.25
      - 0.5
      - 0.75
      - 1.0
      - 1.5
      - 2.0
    model: qwen-plus
    target_metric: Value F1
    threshold: 0.5
  output_dir: experiment_outputs/results/profile
  repos:
    - name: Signal-Android
      path: data/repos/Signal-Android
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: focus-android
      path: data/repos/focus-android
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: openclaw
      path: data/repos/openclaw
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: carmen
      path: data/repos/carmen
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: kubernetes
      path: data/repos/kubernetes
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: git
      path: data/repos/git
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/
    - name: proposal-type-annotations
      path: data/repos/proposal-type-annotations
      doc_sources:
        - README.md
        - CONTRIBUTING.md
        - .github/
        - docs/

prompts:
  code_value_risk:
    system_prompt: |
      You are an experienced software engineer and project manager specializing in value-risk analysis of software systems.

      Your task is to analyze the given code and identify potential value risks.

      A value risk is a potential issue where a software system may negatively impact important values of users or stakeholders (e.g., privacy, security, fairness, usability).
    user_prompt_template: |
      ## Value Scenario (Code)
      ```
      {value_scenario}
      ```

      ## Value Model Reference
      Below are the possible value types and their definitions:
      {value_model}

      ## Task
      Please answer the following two questions from the perspective of a software engineer and project manager:

      (1) Does the code above face value risks? Answer "yes" or "no".

      (2) If it faces value risks, which value risks may be involved? Select relevant value types from the value model above and explain why.

      ## Output Format
      Please strictly output in the following JSON format:
      ```json
      {
        "has_value_risk": true/false,
        "identified_values": [
          {
            "value_id": "Value ID (e.g., HV1, SV1)",
            "value_name": "Value name",
            "confidence": confidence between 0.0 and 1.0,
            "reasoning": "Reason for identifying this value risk"
          }
        ],
        "overall_analysis": "Overall analysis"
      }
      ```
  text_value_risk:
    system_prompt: |
      You are an experienced software engineer and project manager specializing in value-risk analysis of software systems.

      Your task is to analyze the given GitHub Issue discussion and identify human-value concerns it involves.

      A value risk is a potential issue where a software system may negatively impact important values of users or stakeholders (e.g., privacy, security, fairness, usability).

      Issue discussions may contain user complaints, feature requests, bug reports, and similar content that implicitly reflects concerns about certain values.
    user_prompt_template: |
      ## Value Scenario (Issue Discussion)
      {value_scenario}

      ## Value Model Reference
      Below are the possible value types and their definitions:
      {value_model}

      ## Task
      Please answer the following two questions from the perspective of a software engineer and project manager:

      (1) Does the issue discussion above involve value risks? Answer "yes" or "no".

      (2) If it involves value risks, which value risks may be involved? Select relevant value types from the value model above and explain why.

      ## Output Format
      Please strictly output in the following JSON format:
      ```json
      {
        "has_value_risk": true/false,
        "identified_values": [
          {
            "value_id": "Value ID (e.g., HV1, SV1)",
            "value_name": "Value name",
            "confidence": confidence between 0.0 and 1.0,
            "reasoning": "Reason for identifying this value risk"
          }
        ],
        "overall_analysis": "Overall analysis"
      }
      ```
  value_risk_identification:
    system_prompt: |
      You are an experienced software engineer and project manager specializing in value-risk analysis of software systems.

      Your task is to analyze the given code or scenario and identify potential value risks.

      A value risk is a potential issue where a software system may negatively impact important values of users or stakeholders (e.g., privacy, security, fairness, usability).
    user_prompt_template: |
      ## Value Scenario
      {value_scenario}

      ## Value Model Reference
      Below are the possible value types and their definitions:
      {value_model}

      ## Task
      Please answer the following two questions from the perspective of a software engineer and project manager:

      (1) Does the code/scenario above face value risks? Answer "yes" or "no".

      (2) If it faces value risks, which value risks may be involved? Select relevant value types from the value model above and explain why.

      ## Output Format
      Please strictly output in the following JSON format:
      ```json
      {
        "has_value_risk": true/false,
        "identified_values": [
          {
            "value_id": "Value ID (e.g., HV1, SV1)",
            "value_name": "Value name",
            "confidence": confidence between 0.0 and 1.0,
            "reasoning": "Reason for identifying this value risk"
          }
        ],
        "overall_analysis": "Overall analysis"
      }
      ```
